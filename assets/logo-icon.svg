<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="squareClip">
      <rect x="26" y="26" width="460" height="460" rx="90"/>
    </clipPath>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#17dd62"/>
      <stop offset="35%"  stop-color="#00c9a7"/>
      <stop offset="65%"  stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#ff3a3a"/>
    </linearGradient>
    <linearGradient id="goldBadge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe566"/>
      <stop offset="100%" stop-color="#c87400"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="52%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#05080f" stop-opacity="0.65"/>
    </radialGradient>
    <filter id="glowRing" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowDrop">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="512" height="512" rx="90" fill="#080c14"/>

  <!-- Dragon logo image -->
  <image href="logo.jpeg"
         x="26" y="26" width="460" height="460"
         clip-path="url(#squareClip)"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- Vignette -->
  <rect x="26" y="26" width="460" height="460" rx="90" fill="url(#vignette)"/>

  <!-- Bottom text fade -->
  <rect x="26" y="330" width="460" height="156" fill="url(#bottomFade)"/>

  <!-- Outer glow ring -->
  <rect x="20" y="20" width="472" height="472" rx="95"
        fill="none" stroke="url(#ringGrad)" stroke-width="4.5"
        filter="url(#glowRing)" opacity="0.9"/>
  <!-- Inner ring -->
  <rect x="30" y="30" width="452" height="452" rx="84"
        fill="none" stroke="#17dd62" stroke-width="1" opacity="0.18"/>

  <!-- Corner accents TL -->
  <rect x="36" y="36" width="12" height="12" fill="#17dd62" opacity="0.75"/>
  <rect x="52" y="36" width="6"  height="6"  fill="#17dd62" opacity="0.3"/>
  <rect x="36" y="52" width="6"  height="6"  fill="#17dd62" opacity="0.3"/>
  <!-- TR -->
  <rect x="464" y="36" width="12" height="12" fill="#17dd62" opacity="0.75"/>
  <rect x="454" y="36" width="6"  height="6"  fill="#17dd62" opacity="0.3"/>
  <rect x="464" y="52" width="6"  height="6"  fill="#17dd62" opacity="0.3"/>
  <!-- BL -->
  <rect x="36"  y="464" width="12" height="12" fill="#f4c430" opacity="0.65"/>
  <rect x="52"  y="470" width="6"  height="6"  fill="#f4c430" opacity="0.25"/>
  <rect x="36"  y="454" width="6"  height="6"  fill="#f4c430" opacity="0.25"/>
  <!-- BR -->
  <rect x="464" y="464" width="12" height="12" fill="#f4c430" opacity="0.65"/>
  <rect x="454" y="470" width="6"  height="6"  fill="#f4c430" opacity="0.25"/>
  <rect x="464" y="454" width="6"  height="6"  fill="#f4c430" opacity="0.25"/>

  <!-- LAUGHTALE text -->
  <text x="256" y="428"
    font-family="'Press Start 2P', 'Courier New', monospace"
    font-size="30" font-weight="900"
    fill="#17dd62" text-anchor="middle"
    filter="url(#textGlow)" letter-spacing="2">LAUGHTALE</text>

  <!-- SMP text -->
  <text x="256" y="464"
    font-family="'Press Start 2P', 'Courier New', monospace"
    font-size="15" fill="rgba(255,255,255,0.72)"
    text-anchor="middle" letter-spacing="13">SMP</text>

  <!-- S12 badge -->
  <rect x="368" y="44" width="80" height="32" rx="7" fill="url(#goldBadge)" filter="url(#shadowDrop)"/>
  <rect x="369" y="45" width="78" height="14" rx="5" fill="#fff8aa" opacity="0.22"/>
  <text x="408" y="66"
    font-family="'Press Start 2P', 'Courier New', monospace"
    font-size="12" fill="#1a0800" font-weight="700"
    text-anchor="middle" letter-spacing="1">S12</text>

  <!-- Sparkle dots -->
  <circle cx="68"  cy="195" r="2.5" fill="#17dd62" opacity="0.5"/>
  <circle cx="444" cy="175" r="2"   fill="#f4c430" opacity="0.55"/>
  <circle cx="58"  cy="330" r="2"   fill="#ff3a3a" opacity="0.4"/>
  <circle cx="452" cy="345" r="2.5" fill="#4ee3e3" opacity="0.5"/>
</svg>
