<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Laughtale SMP</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       #a855f7;
      --purple-dark:  #7c3aed;
      --surface:      rgba(255,255,255,0.03);
      --border:       rgba(168,85,247,0.18);
      --border-focus: rgba(168,85,247,0.55);
      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --text-subtle:  #94a3b8;
      --bg:           #09090e;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      padding: 1.5rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 55%, rgba(168,85,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 15%, rgba(124,58,237,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 90%, rgba(168,85,247,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Card */
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: rgba(12,12,20,0.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.05),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(168,85,247,0.04);
      animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(16px) scale(0.98); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Header */
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header a { text-decoration: none; color: inherit; display: inline-block; }

    .auth-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(168,85,247,0.18), rgba(124,58,237,0.12));
      border: 1px solid rgba(168,85,247,0.22);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .auth-icon svg { width: 22px; height: 22px; }

    .auth-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 50%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-header p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }

    .auth-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 1.75rem;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 3px;
    }
    .auth-tab {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }
    .auth-tab:hover:not(.active) { color: var(--text-subtle); }
    .auth-tab.active {
      background: rgba(168,85,247,0.15);
      color: var(--purple);
      box-shadow: 0 0 12px rgba(168,85,247,0.08);
    }

    /* Alert */
    .auth-alert {
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
      line-height: 1.45;
      animation: alertIn 0.2s ease both;
    }
    @keyframes alertIn {
      from { opacity:0; transform: translateY(-4px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .auth-alert.error   { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.22); color: #fca5a5; }
    .auth-alert.success { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.22);  color: #86efac; }
    .auth-alert.show    { display: flex; }
    .alert-icon { flex-shrink: 0; margin-top: 1px; }
    .alert-icon svg { width: 14px; height: 14px; }

    /* Form */
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-subtle);
      margin-bottom: 0.45rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
      display: flex;
    }
    .input-icon svg { width: 15px; height: 15px; }
    .input-wrap:focus-within .input-icon { color: var(--purple); }

    .form-group input {
      width: 100%;
      padding: 0.72rem 1rem 0.72rem 2.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--border-focus);
      background: rgba(168,85,247,0.03);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.08);
    }
    .form-group input::placeholder { color: #334155; }

    /* Button */
    .btn-submit {
      width: 100%;
      padding: 0.78rem;
      margin-top: 0.6rem;
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(168,85,247,0.25);
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:hover  { box-shadow: 0 6px 28px rgba(168,85,247,0.35); }
    .btn-submit:active { transform: scale(0.985); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* Footer */
    .auth-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .auth-footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .auth-footer a svg { width: 13px; height: 13px; }
    .auth-footer a:hover { color: var(--purple); }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <a href="./">
        <div class="auth-icon">
          <!-- sword / game icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
            <path d="M13 19l6-6"/>
            <path d="M2 2l20 20"/>
            <path d="M20 2l-8.5 8.5"/>
          </svg>
        </div>
        <h1>LAUGHTALE SMP</h1>
        <p>Masuk ke akun atau buat yang baru</p>
      </a>
    </div>

    <div class="auth-divider"></div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab"        onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert">
      <span class="alert-icon" id="alert-icon"></span>
      <span id="alert-text"></span>
    </div>

    <!-- Form Login -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" id="login-email" placeholder="email@kamu.com" required autocomplete="email" />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="Masukkan password" required autocomplete="current-password" />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btn-login">Masuk</button>
    </form>

    <!-- Form Register -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" id="reg-email" placeholder="email@kamu.com" required autocomplete="email" />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-password" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password" />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
        </div>
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-confirm" placeholder="Ulangi password" required minlength="6" autocomplete="new-password" />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </span>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btn-register">Buat Akun</button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <a href="./">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Kembali ke beranda
      </a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const ALERT_ICONS = {
      error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
      success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>'
    };
    function showAlert(msg, type = 'error') {
      const wrap = document.getElementById('auth-alert');
      document.getElementById('alert-icon').innerHTML = ALERT_ICONS[type] || '';
      document.getElementById('alert-text').textContent = msg;
      wrap.className = `auth-alert ${type} show`;
    }
    function hideAlert() {
      document.getElementById('auth-alert').className = 'auth-alert';
    }
    function switchTab(tab) {
      hideAlert();
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', tab === 'login');
      tabs[1].classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
    }
  </script>
</body>
</html>
