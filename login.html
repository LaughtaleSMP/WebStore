<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Laughtale SMP</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       #a855f7;
      --purple-dark:  #7c3aed;
      --purple-glow:  rgba(168, 85, 247, 0.15);
      --surface:      rgba(255, 255, 255, 0.03);
      --border:       rgba(168, 85, 247, 0.18);
      --border-focus: rgba(168, 85, 247, 0.55);
      --text:         #e2e8f0;
      --text-muted:   #64748b;
      --text-subtle:  #94a3b8;
      --bg:           #09090e;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      padding: 1.5rem 1rem;
      overflow-x: hidden;
    }

    /* ── Latar belakang ambient ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 55%, rgba(168,85,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 15%, rgba(124,58,237,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 90%, rgba(168,85,247,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Partikel kecil dekorasi ── */
    body::after {
      content: '';
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card utama ── */
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: rgba(12, 12, 20, 0.85);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.05),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(168,85,247,0.04);
      animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo / header ── */
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header a { text-decoration: none; color: inherit; display: inline-block; }

    .auth-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(124,58,237,0.15));
      border: 1px solid rgba(168,85,247,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1.4rem;
    }

    .auth-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 50%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .auth-header p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      letter-spacing: 0.01em;
    }

    /* ── Divider ── */
    .auth-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 1.75rem;
    }

    /* ── Tab toggle ── */
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 3px;
    }
    .auth-tab {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.22s ease;
      letter-spacing: 0.01em;
    }
    .auth-tab:hover:not(.active) { color: var(--text-subtle); }
    .auth-tab.active {
      background: rgba(168,85,247,0.15);
      color: var(--purple);
      box-shadow: 0 0 12px rgba(168,85,247,0.08);
    }

    /* ── Alert ── */
    .auth-alert {
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
      line-height: 1.45;
      animation: alertIn 0.2s ease both;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-alert.error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
    }
    .auth-alert.success {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.25);
      color: #86efac;
    }
    .auth-alert.show { display: flex; }
    .alert-icon { font-size: 0.85rem; flex-shrink: 0; margin-top: 0.05rem; }

    /* ── Form ── */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-subtle);
      margin-bottom: 0.45rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }
    .input-wrap .input-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-group input {
      width: 100%;
      padding: 0.72rem 1rem 0.72rem 2.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--border-focus);
      background: rgba(168,85,247,0.04);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.08);
    }
    .form-group input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--purple); }
    .form-group input::placeholder { color: #334155; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 0.78rem;
      margin-top: 0.6rem;
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(168,85,247,0.25);
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:hover { box-shadow: 0 6px 28px rgba(168,85,247,0.35); }
    .btn-submit:active { transform: scale(0.985); }
    .btn-submit:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Footer link ── */
    .auth-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .auth-footer a {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .auth-footer a:hover { color: var(--purple); }
    .auth-footer span { color: rgba(255,255,255,0.1); font-size: 0.7rem; }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <a href="./">
        <div class="auth-icon">⚔️</div>
        <h1>LAUGHTALE SMP</h1>
        <p>Masuk ke akun atau buat yang baru</p>
      </a>
    </div>

    <div class="auth-divider"></div>

    <!-- Tab -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab"        onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert">
      <span class="alert-icon" id="alert-icon"></span>
      <span id="alert-text"></span>
    </div>

    <!-- Form Login -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" id="login-email" placeholder="email@kamu.com" required autocomplete="email" />
          <span class="input-icon">✉</span>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="Masukkan password" required autocomplete="current-password" />
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btn-login">Masuk</button>
    </form>

    <!-- Form Register -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" id="reg-email" placeholder="email@kamu.com" required autocomplete="email" />
          <span class="input-icon">✉</span>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-password" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password" />
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <div class="input-wrap">
          <input type="password" id="reg-confirm" placeholder="Ulangi password" required minlength="6" autocomplete="new-password" />
          <span class="input-icon">🔑</span>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btn-register">Buat Akun</button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <a href="./">← Kembali ke beranda</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function showAlert(msg, type = 'error') {
      const wrap = document.getElementById('auth-alert');
      const icon = document.getElementById('alert-icon');
      const text = document.getElementById('alert-text');
      icon.textContent = type === 'error' ? '⚠' : '✓';
      text.textContent = msg;
      wrap.className = `auth-alert ${type} show`;
    }
    function hideAlert() {
      document.getElementById('auth-alert').className = 'auth-alert';
    }
    function switchTab(tab) {
      hideAlert();
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', tab === 'login');
      tabs[1].classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
    }
  </script>
</body>
</html>
