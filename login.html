<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Laughtale SMP</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      padding: 1rem;
    }

    /* Background gradient sama seperti index.html */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(12px);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .auth-logo a {
      text-decoration: none;
      color: inherit;
    }
    .auth-logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-logo p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    /* Tab toggle */
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 1.8rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.55rem;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: rgba(168,85,247,0.2);
      color: #a855f7;
    }

    /* Form */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: rgba(168,85,247,0.5);
    }
    .form-group input::placeholder {
      color: #475569;
    }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Alert */
    .auth-alert {
      display: none;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    .auth-alert.error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .auth-alert.success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .auth-alert.show    { display: block; }

    .auth-back {
      display: block;
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: #64748b;
      text-decoration: none;
    }
    .auth-back:hover { color: #a855f7; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-logo">
      <a href="./">
        <h1>LAUGHTALE SMP</h1>
        <p>Masuk atau buat akun baru</p>
      </a>
    </div>

    <!-- Tab -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert"></div>

    <!-- Form Login -->
    <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="email@kamu.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-submit" id="btn-login">Masuk</button>
    </form>

    <!-- Form Register -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="email@kamu.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Minimal 6 karakter" required minlength="6" />
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="reg-confirm" placeholder="Ulangi password" required minlength="6" />
      </div>
      <button type="submit" class="btn-submit" id="btn-register">Buat Akun</button>
    </form>

    <a href="./" class="auth-back">← Kembali ke beranda</a>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
