<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Laughtale SMP</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:         #a855f7;
      --purple-dark:    #7c3aed;
      --border:         rgba(168,85,247,0.16);
      --border-soft:    rgba(255,255,255,0.07);
      --border-focus:   rgba(168,85,247,0.5);
      --text:           #e2e8f0;
      --text-muted:     #64748b;
      --text-subtle:    #94a3b8;
      --bg:             #08080d;
      --card-bg:        rgba(11,11,18,0.92);
      --input-bg:       rgba(255,255,255,0.035);
      --input-bg-focus: rgba(168,85,247,0.04);
      --ease-out:       cubic-bezier(0.16,1,0.3,1);
    }

    html { height: 100%; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      padding: 1.5rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 12% 60%, rgba(168,85,247,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 88% 12%, rgba(124,58,237,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 45% 35% at 50% 95%, rgba(168,85,247,0.04) 0%, transparent 55%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
      pointer-events: none;
    }

    /* ─ Card ─ */
    .auth-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 388px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2.25rem 2rem 2rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.04),
        0 24px 64px rgba(0,0,0,0.6),
        0 0 120px rgba(168,85,247,0.03);
      animation: cardIn 0.45s var(--ease-out) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(20px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ─ Header ─ */
    .auth-header { text-align: center; margin-bottom: 1.75rem; }
    .auth-header a { text-decoration: none; color: inherit; }

    .auth-logo {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 52px; height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(168,85,247,0.16), rgba(124,58,237,0.1));
      border: 1px solid rgba(168,85,247,0.2);
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(168,85,247,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
      transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
    }
    .auth-logo:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(168,85,247,0.18); }
    .auth-logo svg { width: 24px; height: 24px; }

    .auth-header h1 {
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #d8b4fe 0%, #a855f7 45%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .auth-header p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* badge "Admin Only" */
    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 0.65rem;
      padding: 3px 9px;
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.18);
      border-radius: 99px;
      font-size: 0.65rem;
      font-weight: 500;
      color: #c084fc;
      letter-spacing: 0.04em;
    }
    .auth-badge svg { width: 10px; height: 10px; }

    /* ─ Divider ─ */
    .auth-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.18), transparent);
      margin-bottom: 1.6rem;
    }

    /* ─ Alert ─ */
    .auth-alert {
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      font-size: 0.78rem;
      margin-bottom: 1.1rem;
      line-height: 1.5;
      animation: alertIn 0.2s ease both;
    }
    @keyframes alertIn {
      from { opacity:0; transform: translateY(-5px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .auth-alert.error   { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.2);  color: #fca5a5; }
    .auth-alert.success { background: rgba(34,197,94,0.07);  border: 1px solid rgba(34,197,94,0.2);  color: #86efac; }
    .auth-alert.show    { display: flex; }
    .alert-icon { flex-shrink: 0; margin-top: 1px; }
    .alert-icon svg { width: 14px; height: 14px; }

    /* ─ Form ─ */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.68rem; font-weight: 600;
      color: var(--text-subtle);
      margin-bottom: 0.4rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 0.85rem;
      top: 50%; transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    .input-icon svg { width: 15px; height: 15px; }
    .input-wrap:focus-within .input-icon { color: var(--purple); }

    .input-toggle {
      position: absolute; right: 0.75rem;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 4px;
      display: flex; align-items: center;
      border-radius: 5px;
      transition: color 0.2s, background 0.2s;
    }
    .input-toggle svg { width: 15px; height: 15px; pointer-events: none; }
    .input-toggle:hover { color: var(--text-subtle); background: rgba(255,255,255,0.05); }

    .form-group input {
      width: 100%;
      padding: 0.7rem 2.45rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-group input[type="password"] { padding-right: 2.6rem; }
    .form-group input:focus {
      border-color: var(--border-focus);
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.09);
    }
    .form-group input::placeholder { color: #2d3748; }
    .form-group input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 40px #0f0f1a inset !important;
      -webkit-text-fill-color: var(--text) !important;
    }

    /* ─ Button ─ */
    .btn-submit {
      width: 100%; padding: 0.76rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
      color: #fff; border: none; border-radius: 11px;
      font-family: inherit; font-size: 0.875rem;
      font-weight: 600; letter-spacing: 0.025em;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 22px rgba(168,85,247,0.28);
      display: flex; align-items: center; justify-content: center; gap: 0.45rem;
    }
    .btn-submit::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-submit:hover:not(:disabled)::before { opacity: 1; }
    .btn-submit:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(168,85,247,0.38); transform: translateY(-1px); }
    .btn-submit:active:not(:disabled) { transform: scale(0.985) translateY(0); }
    .btn-submit:disabled { opacity: 0.42; cursor: not-allowed; box-shadow: none; }

    .spinner {
      display: none; width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.65s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: 0.6; }

    /* ─ Footer ─ */
    .auth-footer {
      display: flex; align-items: center; justify-content: center;
      margin-top: 1.4rem; padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,0.045);
    }
    .auth-footer a {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.76rem; color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.01em;
    }
    .auth-footer a svg { width: 13px; height: 13px; transition: transform 0.2s var(--ease-out); }
    .auth-footer a:hover { color: #c084fc; }
    .auth-footer a:hover svg { transform: translateX(-3px); }

    @media (max-width: 440px) {
      .auth-card { padding: 1.75rem 1.35rem 1.5rem; border-radius: 18px; }
    }
  </style>
</head>
<body>

  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <a href="./">
        <div class="auth-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
            <path d="M13 19l6-6"/>
            <path d="M2 2l20 20"/>
            <path d="M20 2l-8.5 8.5"/>
          </svg>
        </div>
        <h1>LAUGHTALE SMP</h1>
        <p>Masuk ke panel admin</p>
      </a>
      <div class="auth-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Admin Only
      </div>
    </div>

    <div class="auth-divider"></div>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert" role="alert">
      <span class="alert-icon" id="alert-icon"></span>
      <span id="alert-text"></span>
    </div>

    <!-- Form Login -->
    <form id="form-login" onsubmit="handleLogin(event)" autocomplete="on">

      <div class="form-group">
        <label for="login-email">Email</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="login-email" placeholder="email@kamu.com" required autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
          <button type="button" class="input-toggle" aria-label="Tampilkan password" onclick="togglePwd('login-password', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btn-login">
        <div class="spinner"></div>
        <span class="btn-text">Masuk ke Panel</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <a href="./">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Kembali ke beranda
      </a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const ALERT_ICONS = {
      error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
      success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>'
    };
    function showAlert(msg, type = 'error') {
      const wrap = document.getElementById('auth-alert');
      document.getElementById('alert-icon').innerHTML = ALERT_ICONS[type] || '';
      document.getElementById('alert-text').textContent = msg;
      wrap.className = `auth-alert ${type} show`;
    }
    function hideAlert() {
      document.getElementById('auth-alert').className = 'auth-alert';
    }
    const EYE_OPEN  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    const EYE_CLOSE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    function togglePwd(inputId, btn) {
      const inp = document.getElementById(inputId);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.innerHTML = show ? EYE_CLOSE : EYE_OPEN;
      btn.setAttribute('aria-label', show ? 'Sembunyikan password' : 'Tampilkan password');
    }
    function setLoading(btnId, state) {
      const btn = document.getElementById(btnId);
      btn.disabled = state;
      btn.classList.toggle('loading', state);
    }
  </script>
</body>
</html>
